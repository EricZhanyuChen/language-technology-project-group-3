### model
model_name_or_path: google/gemma-4-31B-it

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_target: all
lora_dropout: 0.05

### dataset
dataset_dir: logic_data/augmented
dataset: fallacy_train
eval_dataset: fallacy_dev
template: gemma4
cutoff_len: 512
overwrite_cache: true
preprocessing_num_workers: 4

### output
output_dir: lora_results/gemma4-31b-lamafactory
logging_steps: 10
save_steps: 500
save_total_limit: 2

### train
per_device_train_batch_size: 2
per_device_eval_batch_size: 4
gradient_accumulation_steps: 8
num_train_epochs: 5
learning_rate: 1.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.01
bf16: true
gradient_checkpointing: true

### eval
val_size: 0
eval_strategy: steps
eval_steps: 200

### misc
seed: 42
report_to: none
