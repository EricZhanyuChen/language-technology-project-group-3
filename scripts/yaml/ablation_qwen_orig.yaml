### model
model_name_or_path: Qwen/Qwen3.5-27B

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_target: all
lora_dropout: 0.1

### dataset
dataset_dir: logic_data/augmented
dataset: fallacy_train_original
eval_dataset: fallacy_dev
template: qwen3_5
cutoff_len: 1024
overwrite_cache: true
preprocessing_num_workers: 4
enable_thinking: false

### output
output_dir: lora_results/qwen3.5-27b-orig
overwrite_output_dir: true
logging_steps: 10
save_steps: 200
save_total_limit: 2

### train
per_device_train_batch_size: 2
per_device_eval_batch_size: 4
gradient_accumulation_steps: 8
num_train_epochs: 5
learning_rate: 1.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.01
bf16: true
gradient_checkpointing: true

### eval
val_size: 0
eval_strategy: steps
eval_steps: 200
load_best_model_at_end: true
early_stopping_steps: 600
metric_for_best_model: eval_loss
greater_is_better: false

### misc
seed: 42
full_determinism: true
report_to: none
